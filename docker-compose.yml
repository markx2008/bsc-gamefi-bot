services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gamefi
      POSTGRES_PASSWORD: gamefi
      POSTGRES_DB: gamefi
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamefi -d gamefi"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://gamefi:gamefi@postgres:5432/gamefi
      PORT: 3000
    command: npm run start
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy

  listener:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://gamefi:gamefi@postgres:5432/gamefi
      PORT: 3001
    command: npm run server
    ports:
      - "${LISTENER_HOST_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
